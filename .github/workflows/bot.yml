name: Telegram Bot Runner

on:
  workflow_dispatch:
  # Uncomment to auto-trigger on a schedule
  # schedule:
  #   - cron: '*/10 * * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 hour max per GitHub Actions limit

    steps:

      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 3. System tools ──────────────────────────────────────────────────────
      - name: Install ffmpeg and 7zip
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg p7zip-full aria2

      # ── 4. Start Telegram API server with STEP-LEVEL env ────────────────────
      - name: Start Telegram Bot API server
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          docker run -d \
            -p 8081:8081 \
            --name telegram-api \
            -e TELEGRAM_API_ID=$TELEGRAM_API_ID \
            -e TELEGRAM_API_HASH=$TELEGRAM_API_HASH \
            aiogram/telegram-bot-api
  
      # ⏳ Wait until server is reachable
      - name: Wait for API server
        run: |
          echo "Waiting for Telegram API server..."
          for i in {1..40}; do
            if curl -s http://127.0.0.1:8081 >/dev/null; then
              echo "✅ API server is reachable"
              break
            fi
            echo "⏳ Attempt $i..."
            sleep 2
          done
  
          echo "===== LAST LOGS ====="
          docker logs telegram-api | tail -n 50
  
      # ❌ Fail early if server still not working
      - name: Verify API server
        run: |
          if ! curl -s http://127.0.0.1:8081 >/dev/null; then
            echo "❌ API server failed to start"
            docker logs telegram-api
            exit 1
          fi

      # ── 8. Run the bot ───────────────────────────────────────────────────────
      #    Runs until: min 10 min elapsed + no active tasks
      #    GitHub Actions keeps this alive up to 6 hours (timeout-minutes above)
      - name: Run Telegram Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ALLOWED_CHAT_IDS: ${{ secrets.ALLOWED_CHAT_IDS }}
        run: python bot.py

      # ── 9. Show server log on failure ────────────────────────────────────────
      - name: Show Bot API Server log (on failure)
        if: failure()
        run: |
          echo "=== Local Bot API Server log ==="
          cat /tmp/tgbotapi.log || echo "(no log file found)"
