name: Telegram Bot Runner
 
on:
  # Trigger manually from GitHub Actions UI
  workflow_dispatch:
 
  # OR schedule: runs every 10 minutes to ensure coverage
  # Uncomment below to auto-start on schedule
  # schedule:
  #   - cron: '*/10 * * * *'
 
jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # GitHub Actions max = 6 hours per job
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
 
      - name: Install dependencies
        run: pip install -r requirements.txt


      - name: Install dependencies for Local Bot API Server
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake \
            zlib1g-dev libssl-dev gperf

      - name: Build & Start Telegram Local Bot API Server
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          git clone --recursive https://github.com/tdlib/telegram-bot-api.git
          cd telegram-bot-api
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          cmake --build . --target telegram-bot-api
          # Start server in background
          ./telegram-bot-api \
            --api-id=$TELEGRAM_API_ID \
            --api-hash=$TELEGRAM_API_HASH \
            --local \
            --http-port=8081 &
          # Wait for it to be ready
          sleep 5
          echo "Local Bot API server started"

      - name: Run Telegram Bot (min 10 min, waits for tasks)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ALLOWED_USER_IDS: ${{ secrets.ALLOWED_USER_IDS }}   # comma-separated, e.g. "123456,789012"
        run: python bot.py
